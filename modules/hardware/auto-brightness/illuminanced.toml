# Base values taken from the upstream default config:
# https://github.com/mikhail-m1/illuminanced/blob/master/illuminanced.toml

[daemonize]
log_to = "syslog"
pid_file = "/run/illuminanced.pid"
log_level = "ERROR"

[general]
check_period_in_seconds = 1
light_steps = 10
min_backlight = 70
step_barrier = 0.1
max_backlight_file = "/sys/class/backlight/amdgpu_bl1/max_brightness"
backlight_file = "/sys/class/backlight/amdgpu_bl1/brightness"
illuminance_file = "/sys/bus/iio/devices/iio:device0/in_illuminance_raw"
event_device_mask = "/dev/input/event*"
event_device_name = ""
enable_max_brightness_mode = true
filename_for_sensor_activation = ""
switch_key_code = 520 # SHIFT+BACKSPACE

[kalman]
q = 1
r = 20
covariance = 10

[light]
points_count = 6

illuminance_0 = 0
light_0 = 0

illuminance_1 = 20
light_1 = 3

illuminance_2 = 300
light_2 = 6

illuminance_3 = 700
light_3 = 7

illuminance_4 = 1100
light_4 = 9

illuminance_5 = 7100
light_5 = 10
